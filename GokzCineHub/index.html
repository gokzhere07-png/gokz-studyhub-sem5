<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOKZ CineHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sora', sans-serif;
        }

        body {
            background-color: #0b0f19 !important;
            color: #ffffff !important;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #e50914;
            letter-spacing: -1px;
        }

        header p {
            color: #94a3b8;
            margin-top: 5px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            padding: 0 20px 30px;
        }

        #movieSearch {
            width: 100%;
            max-width: 500px;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        #movieSearch:focus {
            border-color: #e50914;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.3);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 2 / 3;
            background: #1e293b;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .movie-card:hover {
            transform: scale(1.05);
            z-index: 5;
        }

        .poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: filter 0.3s;
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(11, 15, 25, 1) 15%, rgba(11, 15, 25, 0.8) 65%, rgba(0,0,0,0.3) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 3;
        }

        .movie-card:hover .card-overlay {
            opacity: 1;
        }

        .movie-card:hover .poster {
            filter: blur(3px) brightness(0.4);
        }

        .movie-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #ffffff !important;
        }

        .movie-info {
            font-size: 13px;
            color: #cbd5e1 !important;
            margin-bottom: 12px;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #3b82f6;
            color: #fff !important;
            padding: 4px 8px;
            font-size: 10px;
            font-weight: 800;
            border-radius: 6px;
            z-index: 4;
        }

        .badge.neon-red {
            background: #e50914;
        }

        .download-btn {
            display: block;
            width: 100%;
            padding: 10px;
            text-align: center;
            background: #e50914;
            color: #fff !important;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #ff1f2a;
        }

        .back-home-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #1e293b;
            color: #fff !important;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .back-home-btn:hover {
            background: #334155;
            border-color: #fff;
        }

        footer {
            text-align: center;
            padding: 40px 20px 0;
            color: #475569;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>🍿 GOKZ CineHub</h1>
        <p>My Ultimate Movie Stash</p>
    </header>

    <section class="search-container">
        <input type="text" id="movieSearch" placeholder="🔍 Search movies or genres..." onkeyup="filterMovies()">
    </section>

    <main class="movie-grid">
        <!-- Movie 1 -->
        <div class="movie-card" data-title="interstellar sci-fi space christopher nolan">
            <span class="badge">1080p</span>
            <img src="interstellar.jpg" alt="Interstellar" class="poster">
            <div class="card-overlay">
                <h3 class="movie-title">Interstellar</h3>
                <p class="movie-info">Sci-Fi • 2014</p>
                <a href="https://new3.gdflix.io/file/ylUddlnLnaDhkqP" target="_blank" class="download-btn">🚀 Download</a>
            </div>
        </div>

        <!-- Movie 2 -->
        <div class="movie-card" data-title="michael 2026 musical action biopic">
            <span class="badge neon-red">4K UHD</span>
            <img src="michael.jpg" alt="Michael" class="poster">
            <div class="card-overlay">
                <h3 class="movie-title">Michael</h3>
                <p class="movie-info">Musical • Action</p>
                <a href="https://transfer.it/t/cc4UCbgHVBZY" target="_blank" class="download-btn">🚀 Download</a>
            </div>
        </div>

        <!-- Movie 3 -->
        <div class="movie-card" data-title="obsession horror thriller drama romance 2026">
            <span class="badge">1080p</span>
            <img src="obsession.jpg" alt="Obsession" class="poster">
            <div class="card-overlay">
                <h3 class="movie-title">Obsession</h3>
                <p class="movie-info">Horror • Thriller</p>
                <!-- Fixed: Active download routing to your specified landing URL -->
                <a href="https://transfer.it/t/OActiSoTHLgZ" target="_blank" class="download-btn">🚀 Download</a>
            </div>
        </div>
    </main>

    <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
        <a href="../index.html" class="back-home-btn">⬅ Back to StudyHub</a>
    </div>

    <footer>
        Made with ❤️ by <b>GOKZ</b>
    </footer>

    <script>
        function filterMovies() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            for (let i = 0; i < cards.length; i++) {
                let titleAttr = cards[i].getAttribute('data-title');
                if (titleAttr.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
